platform:
  name: proxy-platform
  version: 0.1.0
  default_mode: public
  supported_modes:
    - public
    - operator

repos:
  - id: remote_proxy
    display_name: remote_proxy
    role: public_runtime_baseline
    required_modes: [public, operator]
    optional: false
    visibility: public
    default_url: https://github.com/GgYu01/remote_proxy.git
    default_path: repos/remote_proxy
    local_override_path: /workspaces/proxy-platform/repos/remote_proxy

  - id: cliproxy_control_plane
    display_name: CliProxy-control-plane
    role: northbound_control_plane
    required_modes: [public, operator]
    optional: false
    visibility: public
    default_url: https://github.com/GgYu01/CliProxy-control-plane.git
    default_path: repos/cliproxy-control-plane
    local_override_path: /workspaces/proxy-platform/repos/cliproxy-control-plane

  - id: proxy_ops_private
    display_name: Proxy_ops_private
    role: private_ops_source_of_truth
    required_modes: [operator]
    optional: true
    visibility: private
    default_url: git@github.com:GgYu01/Proxy_ops_private.git
    default_path: repos/proxy_ops_private
    local_override_path: /workspaces/proxy-platform/repos/proxy_ops_private

  - id: remote_browser
    display_name: remote_browser
    role: optional_provider
    required_modes: [operator]
    optional: true
    visibility: public
    default_url: https://github.com/GgYu01/remote_browser.git
    default_path: repos/remote_browser
    local_override_path: /workspaces/proxy-platform/repos/remote_browser

  - id: webchat_openai_runtime
    display_name: webchat-openai-runtime
    role: optional_provider_runtime
    required_modes: [operator]
    optional: true
    visibility: public
    # Runtime-local operator workbench: per-account browser login session start/reuse,
    # state/screenshot/input inspection, and save-back into the account pool.
    default_url: https://github.com/GgYu01/webchat-openai-runtime.git
    default_path: repos/webchat-openai-runtime
    local_override_path: /workspaces/proxy-platform/repos/webchat-openai-runtime

state:
  host_registry:
    inventory_path: repos/proxy_ops_private/inventory/nodes.yaml
    subscriptions_path: repos/proxy_ops_private/inventory/subscriptions.yaml
    observations_path: state/observations/hosts.json
    required_modes: [operator]
  jobs:
    audit_path: state/jobs/audit
    handoff_path: state/jobs/handoffs
    required_modes: [operator]
    require_confirmation: true
    kinds:
      - id: add_host
        allow_apply: true
        executor: inventory_only
      - id: remove_host
        allow_apply: true
        executor: inventory_only
      - id: deploy_host
        allow_apply: true
        executor: authority_handoff
      - id: decommission_host
        allow_apply: true
        executor: authority_handoff
  local_providers:
    - id: local_mcp_pool
      display_name: Local MCP pool
      kind: mcp
      startup_timeout_seconds: 15
      request_timeout_seconds: 45
      startup_max_attempts: 3
      request_max_attempts: 2
    - id: remote_browser_adapter
      display_name: remote_browser adapter
      kind: browser
      owner_repo_id: remote_browser
      startup_timeout_seconds: 15
      request_timeout_seconds: 45
      startup_max_attempts: 2
      request_max_attempts: 2

authority_adapters:
  - id: remote_proxy_cliproxy_plus_standalone
    display_name: remote_proxy cliproxy-plus standalone handoff
    owner_repo_id: remote_proxy
    required_modes: [operator]
    job_kinds: [deploy_host]
    topology: standalone_vps
    runtime_service: cliproxy-plus
    handoff_method: service_script
    entrypoint: repos/remote_proxy/scripts/service.sh
    service_name: cliproxy-plus
    actions:
      deploy_host: install
    required_paths:
      - repos/remote_proxy
    required_env_files:
      - repos/remote_proxy/config/cliproxy-plus.env
    required_env_keys:
      - CLIPROXY_IMAGE
      - CLIPROXY_PORT
      - CLIPROXY_MEMORY_LIMIT
      - CLIPROXY_MANAGEMENT_KEY
      - CLIPROXY_MANAGEMENT_ALLOW_REMOTE
      - CLIPROXY_API_KEY
      - CLIPROXY_USAGE_STATISTICS_ENABLED
    rollback_owner: remote_proxy
    rollback_hint: Review remote_proxy install/update path before rollback.
    notes:
      - proxy-platform only creates a reviewed handoff artifact
      - actual host mutation remains in remote_proxy on the target host
  - id: remote_proxy_cliproxy_plus_standalone_decommission
    display_name: remote_proxy cliproxy-plus standalone decommission handoff
    owner_repo_id: remote_proxy
    required_modes: [operator]
    job_kinds: [decommission_host]
    topology: standalone_vps
    runtime_service: cliproxy-plus
    handoff_method: runbook_only
    entrypoint: repos/remote_proxy/docs/deploy/cliproxy-plus-standalone-vps.md
    actions:
      decommission_host: manual_service_removal
    required_paths:
      - repos/remote_proxy
    required_env_files:
      - repos/remote_proxy/config/cliproxy-plus.env
    required_env_keys:
      - CLIPROXY_MANAGEMENT_KEY
    rollback_owner: remote_proxy
    rollback_hint: Re-run reviewed install after remote cleanup if rollback is needed.
    notes:
      - remote_proxy does not expose a shared decommission command yet
  - id: remote_proxy_cliproxy_plus_infra_core_sidecar
    display_name: remote_proxy infra-core sidecar handoff
    owner_repo_id: remote_proxy
    required_modes: [operator]
    job_kinds: [deploy_host, decommission_host]
    topology: infra_core_sidecar
    runtime_service: cliproxy-plus
    handoff_method: runbook_only
    entrypoint: repos/remote_proxy/docs/deploy/infra-core-ubuntu-online.md
    actions:
      deploy_host: review_sidecar_deploy
      decommission_host: review_sidecar_decommission
    required_paths:
      - repos/remote_proxy
    downstream_required_paths:
      - /mnt/hdo/infra-core
    required_env_files: []
    required_env_keys: []
    rollback_owner: infra_core
    rollback_hint: Use infra-core compose rollback after owner review.
    notes:
      - do not run remote_proxy install.sh inside /mnt/hdo/infra-core
      - actual compose lifecycle remains owned by infra-core

state_sources:
  - id: host_registry
    display_name: Host Registry
    description: 期望状态主机登记册，定义哪些主机属于平台现场清单
    kind: host_registry
    repo_id: proxy_ops_private
    path: inventory/nodes.yaml
    ownership: private_truth
    required_modes: [operator]

  - id: subscription_policy
    display_name: Subscription Policy
    description: 订阅发布策略与公开入口配置
    kind: subscription_policy
    repo_id: proxy_ops_private
    path: inventory/subscriptions.yaml
    ownership: private_truth
    required_modes: [operator]

  - id: host_observation
    display_name: Host Observation Feed
    description: 平台收集的远端 probe 或 agent 回报，用于展示现场观测状态
    kind: host_observation
    repo_id: proxy-platform
    path: state/observations/hosts.json
    ownership: platform_observed_state
    required_modes: [public, operator]

  - id: public_host_console_snapshot
    display_name: Public Host Console Snapshot
    description: 公开可读的脱敏主机视图快照，只包含展示与订阅所需字段
    kind: public_host_console_snapshot
    repo_id: proxy-platform
    path: state/public/host_console.json
    ownership: public_projection
    required_modes: [public]

  - id: public_subscription_snapshot
    display_name: Public Subscription Snapshot
    description: 公开可读的脱敏订阅派生快照
    kind: public_subscription_snapshot
    repo_id: proxy-platform
    path: state/public/subscriptions.json
    ownership: public_projection
    required_modes: [public]

projections:
  - id: host_console
    display_name: Host Console View
    description: 页面主机列表，基于登记册和观测状态共同生成
    kind: host_console_projection
    source_ids: [host_registry, host_observation]
    required_modes: [operator]
    rules:
      include_expected_hosts: true
      include_observation_only_hosts: false

  - id: subscription_nodes
    display_name: Subscription Nodes View
    description: 订阅产物视图，基于登记册、订阅策略和观测状态派生
    kind: subscription_projection
    source_ids: [host_registry, subscription_policy, host_observation]
    required_modes: [operator]
    rules:
      require_registry_enabled: true
      include_unhealthy_observed_hosts: true
      include_observation_only_hosts: false

  - id: public_host_console
    display_name: Public Host Console View
    description: public 模式使用的脱敏主机快照视图
    kind: public_host_console_projection
    source_ids: [public_host_console_snapshot]
    required_modes: [public]
    rules:
      snapshot_only: true

  - id: public_subscription_nodes
    display_name: Public Subscription View
    description: public 模式使用的脱敏订阅快照视图
    kind: public_subscription_projection
    source_ids: [public_subscription_snapshot]
    required_modes: [public]
    rules:
      snapshot_only: true

toolchains:
  - id: cliproxy_plus_standalone
    display_name: cliproxy-plus standalone VPS
    description: remote_proxy 中 CLIProxyAPIPlus 独立 VPS 路径的宿主机依赖基线
    required_modes: [public, operator]
    repo_ids: [remote_proxy]
    python:
      min_version: "3.9"
      candidates: [python3.13, python3.12, python3.11, python3.10, python3.9, python3]
      env_hint: REMOTE_PROXY_PYTHON_BIN
    commands:
      - id: curl
        display_name: curl
        argv: [curl, --version]
      - id: jq
        display_name: jq
        argv: [jq, --version]
      - id: podman
        display_name: podman
        argv: [podman, --version]
      - id: systemctl
        display_name: systemctl
        argv: [systemctl, --version]

  - id: control_plane_compose
    display_name: control-plane compose runtime
    description: CliProxy-control-plane compose 运行路径的本机/宿主机依赖基线
    required_modes: [public, operator]
    repo_ids: [cliproxy_control_plane]
    python:
      min_version: "3.11"
      candidates: [python3.13, python3.12, python3.11, python3]
      env_hint: CLIPROXY_CONTROL_PLANE_PYTHON_BIN
    commands:
      - id: docker
        display_name: docker
        argv: [docker, --version]
      - id: docker_compose
        display_name: Docker Compose
        argv: [docker, compose, version]
        fallback_argvs:
          - [docker-compose, --version]

commands:
  doctor:
    description: 检查工作区仓库状态与宿主机 toolchain profile
  hosts:
    description: 读取主机登记册和观测回报，输出平台视角的主机状态视图
  init:
    description: 初始化工作区，支持 fetch / local override / clone 三类物化路径
  jobs:
    description: 生成 mutation job plan，记录 audit，并在允许的 executor 上执行 apply
  subscriptions:
    description: 基于主机登记册和观测回报预览订阅派生结果
  sync:
    description: 同步工作区仓库，支持 fetch / local override / clone 三类物化路径
